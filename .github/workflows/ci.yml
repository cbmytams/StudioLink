name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --strict

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Tests
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_TEST }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_TEST }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_TEST }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_TEST }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Bundle size check
        run: |
          TOTAL=$(find dist/assets -name "*.js" \
            -exec wc -c {} \; | awk '{sum += $1} END {print sum}')
          MAX=2000000
          echo "Bundle size: ${TOTAL} bytes"
          if [ "$TOTAL" -gt "$MAX" ]; then
            echo "❌ Bundle too large: ${TOTAL} bytes (max: ${MAX})"
            exit 1
          fi
          echo "✅ Bundle size OK: ${TOTAL} bytes"

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: NPM audit
        run: npm audit --production --audit-level=high
      - name: Check for secrets in source
        run: |
          if grep -rn "supabase_service_role\|SERVICE_ROLE_KEY" \
            src/ --include="*.ts" --include="*.tsx" \
            --include="*.js" 2>/dev/null; then
            echo "❌ Potential secret found in source code"
            exit 1
          fi
          echo "✅ No secrets found in source code"
